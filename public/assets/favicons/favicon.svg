<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000"
     height="1000">
    <style>
        #light-icon {
        display: inline;
        }
        #dark-icon {
        display: none;
        }

        @media (prefers-color-scheme: dark) {
        #light-icon {
        display: none;
        }
        #dark-icon {
        display: inline;
        }
        }
    </style>
    <g id="light-icon">
        <svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000"
             height="1000">
            <g>
                <g transform="matrix(10,0,0,10,0,0)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
                        <text x="50" y="50" fill="#061812" font-family="Ubuntu, sans-serif" font-size="120"
                              font-weight="700" dominant-baseline="central" text-anchor="middle">C
                        </text>
                    </svg>
                </g>
            </g>
        </svg>
    </g>
    <g id="dark-icon">
        <svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000"
             height="1000">
            <g>
                <g transform="matrix(10,0,0,10,0,0)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
                        <text x="50" y="50" fill="#FFFFFF" font-family="Ubuntu, sans-serif" font-size="120"
                              font-weight="700" dominant-baseline="central" text-anchor="middle">C
                        </text>
                    </svg>
                </g>
            </g>
        </svg>
    </g>
</svg>